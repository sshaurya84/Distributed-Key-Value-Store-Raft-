version: "3.8"

services:
  node1:
    build: .
    command:
      - "--id=node1"
      - "--grpc-port=50051"
      - "--http-port=8081"
      - "--peers=node2:50052,node3:50053"
      - "--data-dir=/data"
    ports:
      - "8081:8081"
      - "50051:50051"
    volumes:
      - node1-data:/data
    networks:
      - raft-net

  node2:
    build: .
    command:
      - "--id=node2"
      - "--grpc-port=50052"
      - "--http-port=8082"
      - "--peers=node1:50051,node3:50053"
      - "--data-dir=/data"
    ports:
      - "8082:8082"
      - "50052:50052"
    volumes:
      - node2-data:/data
    networks:
      - raft-net

  node3:
    build: .
    command:
      - "--id=node3"
      - "--grpc-port=50053"
      - "--http-port=8083"
      - "--peers=node1:50051,node2:50052"
      - "--data-dir=/data"
    ports:
      - "8083:8083"
      - "50053:50053"
    volumes:
      - node3-data:/data
    networks:
      - raft-net

volumes:
  node1-data:
  node2-data:
  node3-data:

networks:
  raft-net:
    driver: bridge
